name: Minify JSON on Change

on:
    push:
        paths:
            - "data/*.json"
    workflow_dispatch:

jobs:
    minify:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v3

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "18"

            - name: Run Minifier Script
              run: node scripts/minify-changed.js

            - name: Commit minified files
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add minified/*.json
                  git diff --cached --quiet || git commit -m "chore: update minified JSONs"
                  git push
