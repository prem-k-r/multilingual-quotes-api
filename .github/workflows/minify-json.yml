# GitHub Actions workflow to automatically minify JSON files
# Triggers when JSON files in data/ folder are changed or manually triggered
name: Minify JSON Files

# Define when this workflow should run
on:
    # Run when JSON files in data/ folder are pushed to repository
    push:
        paths:
            - "data/**/*.json"
    # Allow manual triggering from GitHub Actions tab
    workflow_dispatch:

jobs:
    minify-json:
        # Use latest Ubuntu runner
        runs-on: ubuntu-latest

        steps:
            # Step 1: Get the repository code
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  # Use GitHub token to allow pushing changes back
                  token: ${{ secrets.GITHUB_TOKEN }}

            # Step 2: Set up Node.js environment
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"

            # Step 3: Create the minified directory if it doesn't exist
            - name: Create minified directory
              run: mkdir -p minified

            # Step 4: Install the JSON minification package
            - name: Install dependencies
              run: npm init -y && npm install jsonminify

            # Step 5: Process and minify only changed JSON files
            - name: Minify JSON files
              run: |
                  # Find all JSON files in data/ directory and process only changed ones
                  find data -name "*.json" -type f | while read -r input_file; do
                      # Extract just the filename (e.g., "en.json" from "data/en.json")
                      filename=$(basename "$input_file")
                      # Set the output path in minified/ folder
                      output_file="minified/$filename"
                      
                      # Check if source is newer than minified file (or minified doesn't exist)
                      # This optimization prevents reprocessing unchanged files
                      if [ "$input_file" -nt "$output_file" ] || [ ! -f "$output_file" ]; then
                          echo "Minifying $input_file -> $output_file (file changed)"
                          
                          # Use Node.js to minify only the changed file
                          node -e "
                              const fs = require('fs');
                              const minify = require('jsonminify');
                              
                              try {
                                  // Read the original JSON file
                                  const content = fs.readFileSync('$input_file', 'utf8');
                                  // Minify it (remove whitespace, comments, etc.)
                                  const minified = minify(content);
                                  // Save the minified version
                                  fs.writeFileSync('$output_file', minified);
                                  console.log('✓ Successfully minified $input_file');
                              } catch (error) {
                                  console.error('✗ Error minifying $input_file:', error.message);
                                  process.exit(1);
                              }
                          "
                      else
                          echo "Skipping $input_file (no changes detected)"
                      fi
                  done

            # Step 6: Create metadata file with information about processed files
            - name: Update metadata file
              run: |
                  # Path for the metadata file
                  metadata_file="metadata.json"

                  # Use Node.js to create comprehensive metadata with quote counting
                  node -e "
                    const fs = require('fs');
                    
                    // Read existing metadata if it exists
                    let metadata = {
                        lastUpdated: '',
                        files: {}
                    };
                    
                    try {
                        if (fs.existsSync('metadata.json')) {
                            metadata = JSON.parse(fs.readFileSync('metadata.json', 'utf8'));
                        }
                    } catch (error) {
                        console.log('Creating new metadata file');
                    }
                    
                    // Get all JSON files in data directory
                    const allFiles = fs.readdirSync('data').filter(file => file.endsWith('.json')).sort();
                    const modificationTimes = [];
                    
                    // Process each file to check if it was recently minified
                    allFiles.forEach((filename) => {
                        const inputFile = 'data/' + filename;
                        const outputFile = 'minified/' + filename;
                        
                        // Only update metadata if the minified file was just created/updated
                        if (fs.existsSync(outputFile)) {
                            const sourceStats = fs.statSync(inputFile);
                            const outputStats = fs.statSync(outputFile);
                            
                            // If output is newer than existing metadata entry, it was just processed
                            const existingTimestamp = metadata.files[filename]?.lastUpdated;
                            const currentTimestamp = sourceStats.mtime.toISOString();
                            
                            if (!existingTimestamp || currentTimestamp !== existingTimestamp || 
                                Math.abs(outputStats.mtime - new Date()) < 60000) { // Within last minute
                                
                                try {
                                    const originalContent = fs.readFileSync(inputFile, 'utf8');
                                    const originalData = JSON.parse(originalContent);
                                    const quoteCount = typeof originalData === 'object' && originalData !== null 
                                        ? Object.keys(originalData).length : 0;
                                    
                                    const fileSize = (outputStats.size / 1024).toFixed(2);
                                    
                                    metadata.files[filename] = {
                                        lastUpdated: currentTimestamp,  // When this source file was last modified
                                        source: inputFile,              // Original file path
                                        quoteCount: quoteCount,         // Number of quotes in the file
                                        size_kb: fileSize               // Minified file size in kilobytes
                                    };
                                    
                                    modificationTimes.push(new Date(currentTimestamp));
                                    console.log('✓ Updated metadata for ' + filename);
                                } catch (error) {
                                    console.error('✗ Error processing ' + filename + ':', error.message);
                                }
                            } else {
                                // Keep existing timestamp for unchanged files
                                if (metadata.files[filename]) {
                                    modificationTimes.push(new Date(metadata.files[filename].lastUpdated));
                                }
                            }
                        }
                    });
                    
                    // Update main lastUpdated only if there were changes
                    if (modificationTimes.length > 0) {
                        const mostRecentTime = new Date(Math.max(...modificationTimes));
                        metadata.lastUpdated = mostRecentTime.toISOString();
                    }
                    
                    fs.writeFileSync('metadata.json', JSON.stringify(metadata, null, 2));
                    console.log('✓ Metadata updated');
                    "

            # Step 7: Check if any files were actually changed
            - name: Check for changes
              id: check_changes
              run: |
                  # Check if there are any uncommitted changes in the minified/ folder or metadata file
                  if [ -n "$(git status --porcelain minified/ metadata.json)" ]; then
                    echo "changes=true" >> $GITHUB_OUTPUT
                    echo "Changes detected in minified files or metadata"
                  else
                    echo "changes=false" >> $GITHUB_OUTPUT
                    echo "No changes detected in minified files or metadata"
                  fi

            # Step 8: Commit and push changes back to repository (only if there are changes)
            - name: Commit and push changes
              if: steps.check_changes.outputs.changes == 'true'
              run: |
                  # Configure git with GitHub Actions bot identity
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  # Add all changes in minified/ folder and metadata file to git
                  git add minified/ metadata.json
                  # Commit with descriptive message (skip ci prevents infinite loops)
                  git commit -m "Auto-minify JSON files and update metadata"
                  # Push changes back to the repository
                  git push
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
